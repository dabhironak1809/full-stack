<!DOCTYPE html>
<html>
<head>
    <title>Phone</title>
</head>
<body>

    <h2>Verified Phone Number</h2>
    <p id="showPhone"></p>

    <script>
        const params = new URLSearchParams(window.location.search);
        const phone = params.get("phone");

        document.getElementById("showPhone").innerText =
            phone ? phone : "No phone number found";

    </script>

</body>
</html>
