<title>Three Content Replacements on Hover (JS)</title>

.current-content {
    font-weight: bold;
}
</style>
</head>
<body>

<p class="hover-box js-swap-content" data-new-text="🎉 New content shown for the **first box**!">
  <span class="current-content">Paragraph 1: Hover over me!</span>
</p>

<p class="hover-box js-swap-content" data-new-text="✅ This is the text swap for **Paragraph 2**! Old text will return.">
  <span class="current-content">Paragraph 2: I hold the original information.</span>
</p>

<p class="hover-box js-swap-content" data-new-text="💡 Look, the text changed for **Paragraph 3**! Done with JavaScript.">
  <span class="current-content">Paragraph 3: JavaScript handles this content change.</span>
</p>

<script>
// 1. Get ALL elements that need the swap functionality
const contentBoxes = document.querySelectorAll('.js-swap-content');

// 2. Map to store the original text for each element
const originalContentMap = new Map();

// 3. Define the swap function
function handleMouseOver(event) {
    const box = event.currentTarget; // The element the listener is attached to
    
    // Store original text if it hasn't been saved yet
    if (!originalContentMap.has(box)) {
        originalContentMap.set(box, box.innerHTML);
    }

    // Get the new text from the data attribute
    const newText = box.getAttribute('data-new-text');
    
    // Replace the content
    if (newText) {
        box.innerHTML = `<span class="current-content">${newText}</span>`;
    }
}

// 4. Define the restore function
function handleMouseOut(event) {
    const box = event.currentTarget; // The element the listener is attached to
    
    // Restore the original text from the map
    if (originalContentMap.has(box)) {
        box.innerHTML = originalContentMap.get(box);
    }
}

// 5. Attach the event listeners to ALL selected boxes
contentBoxes.forEach(box => {
    box.addEventListener('mouseenter', handleMouseOver);
    box.addEventListener('mouseleave', handleMouseOut);
});
</script>

</body>
</html> -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #navbar {
  background-color: transparent;
  position: fixed; /* Keep it at the top */
  top: 0;
  width: 100%;
  z-index: 1000;
  padding: 15px; /* Example padding */
}

/* New class to be added by JavaScript */
.scrolled {
  background-color: black !important;
}
    </style>
</head>
<body>
    <nav id="navbar">
  </nav>

<div style="height: 2000px;">
</div>

<script>
    window.onscroll = function() {
  scrollFunction();
};

function scrollFunction() {
  const navbar = document.getElementById("navbar");
  // Define the scroll distance before the color change (e.g., 50 pixels)
  const scrollThreshold = 50;

  if (document.body.scrollTop > scrollThreshold || document.documentElement.scrollTop > scrollThreshold) {
    // User has scrolled down past the threshold
    navbar.classList.add("scrolled");
  } else {
    // User is at the top of the page
    navbar.classList.remove("scrolled");
  }
}
