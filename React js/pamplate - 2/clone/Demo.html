<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* --- Default Styling (Mobile/Small Screen - Content On Top, Image On Bottom) --- */

        .carousel-item {
            display: flex;
            flex-direction: column;
            /* Stacks items vertically */
            width: 100%;
            /* Takes full width */
        }

        .content-panel {
            /* Padding, text styles, etc. */
            padding: 20px;
            order: 1;
            /* Content is first in the stacking order */
        }

        .image-panel {
            /* Image container styles */
            order: 2;
            /* Image is second in the stacking order */
        }

        .image-panel img {
            width: 100%;
            height: auto;
            display: block;
        }
        /* --- Media Query for Desktop (1025px and wider - Content Left, Image Right) --- */

@media (min-width: 1025px) {
    .carousel-item {
        flex-direction: row; /* Arranges items horizontally (side-by-side) */
        min-height: 400px; /* Example height for the carousel on desktop */
    }

    .content-panel {
        flex: 1; /* Takes up 50% of the width (since the image-panel is also flex: 1) */
        order: 1; /* Content is still first (left side) */
        display: flex; /* Optional: Center content vertically */
        justify-content: center;
        align-items: center;
    }

    .image-panel {
        flex: 1; /* Takes up 50% of the width */
        order: 2; /* Image is second (right side) */
        overflow: hidden; /* Ensures image fits within its panel */
    }

    .image-panel img {
        /* Ensure the image covers the full panel space */
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
}
    </style>
</head>
<body>
    <div class="carousel-item">
        <div class="content-panel">
            <h3>Carousel Title</h3>
            <p>This is the descriptive text for the carousel slide.</p>
            <button>Learn More</button>
        </div>
        <div class="image-panel">
            <img src="img/banner1-xl.webp" alt="Description of the slide image">
        </div>
    </div>

</body>
</html>
