<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Carousel Slider</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        #flipkartCarousel .custom-indicators button {
            background-color: transparent;
            width: 62px;
            height: 4px;
            margin: 0 5px;
            border: 1px solid #ccc;
            position: relative;
            overflow: hidden;
            transition: background-color 0.3s;
        }

        #flipkartCarousel .custom-indicators .active {
            background-color: #ddd;
        }

        #flipkartCarousel .custom-indicators .active::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background-color: #000;
            transform: translateX(-100%);

            animation: indicator-progress 3.1s linear forwards;
        }


        @keyframes indicator-progress {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>

    <div id="flipkartCarousel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="3100">
        <div class="carousel-indicators custom-indicators">
            <button type="button" data-bs-target="#flipkartCarousel" data-bs-slide-to="0" class="active"
                aria-current="true" aria-label="Slide 1"></button>
            <button type="button" data-bs-target="#flipkartCarousel" data-bs-slide-to="1" aria-label="Slide 2"></button>
            <button type="button" data-bs-target="#flipkartCarousel" data-bs-slide-to="2" aria-label="Slide 3"></button>
            <button type="button" data-bs-target="#flipkartCarousel" data-bs-slide-to="3" aria-label="Slide 4"></button>
        </div>

        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="sslider_photo/i1.webp" class="d-block w-100" alt="First slide">
            </div>
            <div class="carousel-item">
                <img src="sslider_photo/i3.webp" class="d-block w-100" alt="Second slide">
            </div>
            <div class="carousel-item">
                <img src="sslider_photo/i2.webp" class="d-block w-100" alt="Second slide">
            </div>
            <div class="carousel-item">
                <img src="sslider_photo/i4.webp" class="d-block w-100" alt="Third slide">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#flipkartCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#flipkartCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const carouselElement = document.getElementById('flipkartCarousel');

            if (carouselElement) {
                // 1. Force animation restart for the initial slide on page load (with a small delay)
                setTimeout(() => {
                    const initialActiveIndicator = carouselElement.querySelector('.carousel-indicators button.active');
                    if (initialActiveIndicator) {
                        const clone = initialActiveIndicator.cloneNode(true);
                        initialActiveIndicator.parentNode.replaceChild(clone, initialActiveIndicator);
                        // The clone will automatically get the 'active' class via Bootstrap's internal code 
                        // as it was replaced in the same spot, but adding it ensures compatibility.
                        clone.classList.add('active');
                    }
                }, 100);

                // 2. Listen for the 'slid' event to restart the animation after every slide change
                carouselElement.addEventListener('slid.bs.carousel', function (e) {

                    const indicatorsContainer = carouselElement.querySelector('.carousel-indicators');
                    // e.to is the index of the new slide (0, 1, 2, etc.)
                    const newActiveIndicator = indicatorsContainer.querySelector(`[data-bs-slide-to="${e.to}"]`);

                    if (newActiveIndicator) {
                        // Cloning and replacing the element is the reliable way to restart CSS animations.
                        const newIndicatorClone = newActiveIndicator.cloneNode(true);
                        newActiveIndicator.parentNode.replaceChild(newIndicatorClone, newActiveIndicator);
                        newIndicatorClone.classList.add('active');
                    }
                });
            }
        });
    </script>
</body>
</html>
