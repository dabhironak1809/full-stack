    <style>
        .carousel-container-wrapper {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }

        .multi-scroll-track {
            display: flex;
            width: 200%;
            transition: transform 0.3s ease-in-out;
            will-change: transform;
        }

        .scroll-item {
            flex-shrink: 0;
            width: 10%;
        }

        .scroll-item img {
            width: 8vw;
        }

        /* .scroll-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        } */

        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            z-index: 10;
            font-size: 24px;
            border-radius: 5px;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .nav-arrow:hover:not(:disabled) {
            opacity: 1;
        }

        .nav-arrow:disabled {
            opacity: 0.3;
            cursor: default;
        }

        .left-arrow {
            left: 0;
        }

        .right-arrow {
            right: 0;
        }
    </style>
</head>

        <button class="nav-arrow left-arrow" id="prevBtn">&#10094;</button>
        <button class="nav-arrow right-arrow" id="nextBtn">&#10095;</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const track = document.querySelector('.multi-scroll-track');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const totalItems = 10;
            const visibleItems = 5;
            const scrollAmount = 100 / visibleItems; // = 20 (percent)

            let currentIndex = 0;

            function updateTrackPosition() {
                // Apply the transform to the track
                const offset = -currentIndex * scrollAmount;
                track.style.transform = `translateX(${offset}%)`;

                // Disable 'Previous' if at the start
                prevBtn.disabled = currentIndex === 0;
                // Disable 'Next' if the last visible image is the last item
                nextBtn.disabled = currentIndex === totalItems - visibleItems;
            }

            nextBtn.addEventListener('click', () => {
                if (currentIndex < totalItems - visibleItems) {
                    currentIndex++;
                    updateTrackPosition();
                }
            });

            prevBtn.addEventListener('click', () => {
                if (currentIndex > 0) {
                    currentIndex--;
                    updateTrackPosition();
                }
            });

            // Initialize button state
            updateTrackPosition();
        });
    </script>
