<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body {
  background-color: lightgreen;
}

@media only screen and (min-width:300px) and  (max-width: 600px) {
  body {
    background-color: lightblue;
  }
}

/* 1. max-width :-> 0 to 100px and max-height:-> 0 to 200px [pixcel range inside of this property lasst point]  */
/* @media (max-width:100px)  and (max-height:200px){ */

/* 2. max-width: 0 to 100px and min-height : 200px >= Npx  */
/* @media (max-width:100px)  and (min-height:200px){ */

/* 3. min-width:100px to Npx and min-height:200px to Npx */
@media (min-width:100px)  and (min-height:200px){
    body{
        background-color: burlywood;
    }
}
</style>
</head>
<body>

<p>Resize the browser window. When the width of this document is 600 pixels or less, the background-color is "lightblue", otherwise it is "lightgreen".</p>

</body>
</html>
